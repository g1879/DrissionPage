name: DrissionPage tests verification

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
  pull_request:
    paths:
      - 'DrissionPage/**'
      - 'tests/**'
      - '.github/workflows/drissionpage-tests.yml'
      - 'requirements.txt'
  push:
    branches:
      - master
      - main
      - 'fix/**'
      - 'feat/**'
    paths:
      - 'DrissionPage/**'
      - 'tests/**'
      - '.github/workflows/drissionpage-tests.yml'
      - 'requirements.txt'

permissions:
  contents: read

concurrency:
  group: drissionpage-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DP_TESTS_REPORT_DIR: ${{ github.workspace }}/tests-artifacts/reports
      DP_TESTS_ARTIFACT_DIR: ${{ runner.temp }}/dp-tests-artifacts
      DP_TESTS_PRE_VENV: ${{ runner.temp }}/dp-tests-pre-venv
      DP_TESTS_TIMEOUT: '10'
      DP_TESTS_REQUIRE_BROWSER: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-dependencies: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tests/ssr-site/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install coverage[toml]

      - name: Build SSR test site
        working-directory: tests/ssr-site
        run: |
          npm ci
          npm run build

      - name: Run tests verification
        env:
          DP_BROWSER_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: ./tests/ci.sh

      - name: Upload tests reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drissionpage-tests-reports
          path: |
            tests-artifacts/reports
            ${{ runner.temp }}/dp-tests-artifacts
          if-no-files-found: warn
          retention-days: 14
